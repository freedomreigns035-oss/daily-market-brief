<!DOCTYPE html>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B',
                        dark: {
                            bg: '#0F172A',
                            card: '#1E293B',
                            border: '#334155'
                        },
                        light: {
                            bg: '#F8FAFC',
                            card: '#FFFFFF',
                            border: '#E2E8F0'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']

                }
            }
        }

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
        
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .price-up {
            color: #10B981;
        }
        
        .price-down {
            color: #EF4444;
        }
        
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .dark .card-hover:hover {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        
        .sparkline {
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .trend-indicator {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .news-item {
            transition: background-color 0.2s;
        }
        
        .news-item:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }
        
        .dark .news-item:hover {
            background-color: rgba(59, 130, 246, 0.15);
        }
        
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #94A3B8;
            border-radius: 3px;
        }
        
        .dark .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #475569;
        }
        
        .market-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .market-open {
            background-color: rgba(16, 185, 129, 0.15);
            color: #10B981;
        }
        
        .market-closed {
            background-color: rgba(148, 163, 184, 0.15);
            color: #94A3B8;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-open {
            background-color: #10B981;
        }
        
        .status-closed {
            background-color: #94A3B8;
        }
        
        .gradient-up {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
        }
        
        .gradient-down {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
        }
        
        .header-glow {
            box-shadow: 0 4px 30px rgba(59, 130, 246, 0.1);
        }
        
        .dark .header-glow {
            box-shadow: 0 4px 30px rgba(59, 130, 246, 0.2);
        }
    </style>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        
        // Check for saved theme preference or default to system preference
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            html.classList.add('dark');
        }
        
        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        // Set current date
        const currentDateEl = document.getElementById('current-date');
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        currentDateEl.textContent = now.toLocaleDateString('en-US', options);

        // Market Status
        function updateMarketStatus() {
            const marketStatusEl = document.getElementById('market-status');
            const statusDot = marketStatusEl.querySelector('.status-dot');
            const statusText = marketStatusEl.querySelector('span:last-child');
            
            const currentHour = new Date().getHours();
            const dayOfWeek = new Date().getDay();
            
            // Simple check: Market open Mon-Fri, 9:30 AM - 4:00 PM ET
            const isOpen = dayOfWeek >= 1 && dayOfWeek <= 5 && currentHour >= 9 && currentHour < 16;
            
            if (isOpen) {
                marketStatusEl.className = 'market-status market-open';
                statusDot.className = 'status-dot status-open';
                statusText.textContent = 'Market Open';
            } else {
                marketStatusEl.className = 'market-status market-closed';
                statusDot.className = 'status-dot status-closed';
                statusText.textContent = 'Market Closed';
            }
        }
        updateMarketStatus();
    </script>
